name: Hugo Pages

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive

      - name: Verify repository source boundary
        run: python3 scripts/verify-repository-state.py

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install Hugo Extended 0.105.0
        run: scripts/install-hugo.sh "$RUNNER_TEMP/hugo-bin"

      - name: Build site
        working-directory: site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: >-
          "$RUNNER_TEMP/hugo-bin/hugo"
          --gc
          --minify
          --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Verify migrated output
        run: >-
          python3 scripts/verify-migration.py
          --manifest docs/migration/legacy-public-paths.txt
          --generated site/public

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/public

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
